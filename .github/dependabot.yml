version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    groups:
      all-github-actions:
        patterns:
          - "*"

  - package-ecosystem: docker
    # "/" covers the image tags in compose.yaml (nginx, certbot, versatiles);
    # "/download" covers the download-updater Dockerfile.
    directories:
      - "/"
      - "/download"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    groups:
      all-docker:
        patterns:
          - "*"
